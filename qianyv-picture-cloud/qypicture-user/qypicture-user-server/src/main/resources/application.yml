server:
  port: 8123
  servlet:
    context-path: /api
spring:
  application:
    name: qypicture-user
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/qy-picture?useUnicode=true&character
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
  cloud:
    nacos:
      server-addr: localhost:8848

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名
  global-config:
    db-config: #配置逻辑删除
      logic-delete-field: delete_time
      logic-delete-value: now()
      logic-not-delete-value: 'null'